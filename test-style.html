<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>style test</title>
<style>
  body { background: #ffaa00; color: #000; font-family: sans-serif; padding: 32px; }
  h1 { color: red; font-size: 60px; }
  .box { background: lime; padding: 16px; border: 4px solid blue; }
</style>
</head>
<body>
  <h1>If you see this in RED on ORANGE, &lt;style&gt; works.</h1>
  <div class="box">This box should be GREEN with a BLUE border.</div>
  <div style="background:purple; color:white; padding:8px; margin-top:8px;">This box uses inline style="" attribute. Should be PURPLE.</div>
</body>
</html>
